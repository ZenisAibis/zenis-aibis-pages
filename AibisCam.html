<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,viewport-fit=cover,user-scalable=no">
<meta name="theme-color" content="#0f1b2d">
<title>z.Aibis カメラ</title>
<link rel="apple-touch-icon" href="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAxOTIgMTkyIj48cmVjdCB3aWR0aD0iMTkyIiBoZWlnaHQ9IjE5MiIgcng9IjM2IiBmaWxsPSIjMGYxYjJkIi8+PGNpcmNsZSBjeD0iOTYiIGN5PSIxMDgiIHI9IjM0IiBmaWxsPSJub25lIiBzdHJva2U9IiNmNTllMGIiIHN0cm9rZS13aWR0aD0iOCIvPjxyZWN0IHg9IjU2IiB5PSI2NCIgd2lkdGg9IjgwIiBoZWlnaHQ9IjE2IiByeD0iNiIgZmlsbD0iIzM0ZTNkMCIvPjx0ZXh0IHg9Ijk2IiB5PSIxMTYiIGZvbnQtZmFtaWx5PSJBcmlhbCIgZm9udC1zaXplPSIyNiIgZm9udC13ZWlnaHQ9IjkwMCIgZmlsbD0iI2Y1OWUwYiIgdGV4dC1hbmNob3I9Im1pZGRsZSI+ei48L3RleHQ+PC9zdmc+">
<style>
  :root{
    --bg:#0f1b2d; --panel:#16263d; --panel2:#1d3251;
    --line:#27405f; --navy:#2c5282; --gold:#f59e0b; --gold2:#d97706;
    --teal:#34e3d0; --txt:#e8eef6; --dim:#8aa0bd; --danger:#ff5d7d; --ok:#34e3d0;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;height:100%;background:var(--bg);color:var(--txt);
    font-family:-apple-system,"Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif;
    overscroll-behavior:none;}
  body{display:flex;flex-direction:column;height:100dvh;overflow:hidden}
  button{font-family:inherit;color:inherit;cursor:pointer;border:none;background:none}
  .hide{display:none!important}
  .scr{flex:1;min-height:0;display:flex;flex-direction:column}

  .top{display:flex;align-items:center;gap:8px;padding:calc(env(safe-area-inset-top) + 8px) 12px 8px;
    background:linear-gradient(180deg,rgba(15,27,45,.90),rgba(15,27,45,.66));-webkit-backdrop-filter:blur(13px) saturate(140%);backdrop-filter:blur(13px) saturate(140%);z-index:10;border-bottom:1px solid rgba(255,255,255,.06)}
  .top .ttl{font-size:13px;font-weight:800;letter-spacing:.5px;color:var(--gold)}
  .top .sub{font-size:11px;color:var(--dim);font-weight:600}
  .tbtn{padding:7px 11px;border-radius:9px;background:var(--panel2);font-size:12.5px;font-weight:700;white-space:nowrap}
  .tbtn:active{background:#264168}
  .tbtn .cnt{color:var(--teal);font-weight:900;margin-left:2px}
  .tbtn .cnt.warn{color:var(--gold)}
  .tbtn .cnt.over{color:var(--danger)}
  .vertag{font-size:10.5px;font-weight:700;color:var(--dim);flex:0 0 auto;letter-spacing:.3px}
  .grow{flex:1;min-width:0}
  .cardchip{display:flex;flex-direction:column;min-width:0}
  .cardchip b{font-size:14px;font-weight:800;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

  #camWrap{position:relative;flex:1;min-height:170px;background:#000;overflow:hidden}
  #video{width:100%;height:100%;object-fit:cover;display:block;background:#000;touch-action:none}
  #focusRing{position:absolute;width:74px;height:74px;margin:-37px 0 0 -37px;border:2px solid #ffd24d;border-radius:50%;box-shadow:0 0 0 1px rgba(0,0,0,.35);pointer-events:none;z-index:6;opacity:0}
  #focusRing.go{animation:focusPulse .65s ease-out}
  @keyframes focusPulse{0%{opacity:0;transform:scale(1.6)}22%{opacity:1}60%{opacity:1;transform:scale(1)}100%{opacity:0;transform:scale(1)}}
  #zoomBadge{position:absolute;left:50%;top:12px;transform:translateX(-50%);background:rgba(0,0,0,.6);color:#fff;border:1px solid rgba(255,255,255,.35);border-radius:14px;font-size:12px;font-weight:800;padding:4px 12px;z-index:6;opacity:0;transition:opacity .2s;pointer-events:none}
  #zoomBadge.show{opacity:1}
  #flashfx{position:absolute;inset:0;background:#fff;opacity:0;pointer-events:none}
  #flashfx.go{animation:flash .28s ease-out}
  @keyframes flash{0%{opacity:.0}15%{opacity:.85}100%{opacity:0}}
  #guide{position:absolute;inset:0;width:100%;height:100%;pointer-events:none;z-index:3}
  #guide .grid line{stroke:rgba(255,255,255,.32);stroke-width:1;vector-effect:non-scaling-stroke}
  #level{position:absolute;left:0;right:0;top:50%;height:0;display:flex;justify-content:center;align-items:center;pointer-events:none;z-index:4}
  #level i{display:block;width:56%;height:3px;border-radius:3px;background:#ffd24d;box-shadow:0 0 3px rgba(0,0,0,.6);transform-origin:center center;transition:background .12s,box-shadow .12s}
  #level.ok i{background:#39e08a;box-shadow:0 0 9px rgba(57,224,138,.95)}
  #compass{position:absolute;left:10px;top:10px;z-index:5;background:rgba(0,0,0,.5);color:#fff;border:1px solid rgba(255,255,255,.35);border-radius:14px;font-size:12px;font-weight:800;padding:5px 11px;letter-spacing:.02em}
  .gpschip{position:absolute;left:0;right:0;bottom:8px;display:flex;justify-content:center;pointer-events:none}
  .gpschip span{background:rgba(15,27,45,.8);border:1px solid var(--line);padding:5px 12px;border-radius:18px;
    font-size:11.5px;font-weight:700;color:var(--dim);max-width:92%;text-align:center}
  .gpschip span b{color:var(--teal)}
  .errcard{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;
    gap:14px;padding:28px;text-align:center}
  .errcard .em{font-size:13px;color:var(--dim);line-height:1.7}

  /* 仕分けパネル（撮影画面の下） */
  #setPanel{background:var(--panel);border-top:1px solid var(--line);padding:8px 12px;max-height:44vh;overflow-y:auto}
  #scrCam.focus #setPanel{display:none}
  #camToggle{position:absolute;right:10px;bottom:10px;z-index:6;background:rgba(0,0,0,.55);color:#fff;border:1px solid rgba(255,255,255,.45);border-radius:20px;font-size:15px;line-height:1;padding:8px 13px;font-weight:700}
  #camToggle:active{background:rgba(0,0,0,.75)}
  .setstrip{display:flex;gap:6px;align-items:center;margin-bottom:8px}
  .sthumb{width:54px;height:54px;border-radius:9px;overflow:hidden;background:var(--panel2);position:relative;flex:0 0 auto;border:1.5px solid var(--line)}
  .sthumb img{width:100%;height:100%;object-fit:cover;display:block}
  .setcnt{margin-left:auto;font-size:13px;font-weight:900;color:var(--teal);flex:0 0 auto}
  .setcnt.full{color:var(--gold)}

  .addrline{display:flex;align-items:center;gap:8px;font-size:13px;margin-bottom:8px}
  .addrline .at{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .addrline .at.pend{color:var(--dim)}
  .mini{padding:7px 11px;border-radius:9px;background:var(--panel2);font-size:12.5px;font-weight:700;flex:0 0 auto}
  .mini:active{background:#264168}
  .mini.danger{background:rgba(255,93,125,.16);color:var(--danger)}
  .banchiline{display:flex;align-items:center;gap:8px;margin-bottom:8px;flex-wrap:wrap}
  .banchiline .bl{font-size:12px;color:var(--dim);font-weight:700;flex:0 0 auto}
  .banchi{flex:1;min-width:80px;padding:10px 13px;border-radius:11px;background:var(--bg);border:1px solid var(--line);
    color:var(--txt);font-size:15px;font-weight:700;letter-spacing:1px}
  .banchi::placeholder{color:var(--dim);font-weight:600;letter-spacing:normal}
  .notewrap{display:flex;gap:8px}
  .notewrap input{flex:1;padding:10px 13px;border-radius:11px;background:var(--bg);border:1px solid var(--line);color:var(--txt);font-size:14px}
  .micbtn{flex:0 0 auto;width:46px;border-radius:11px;background:var(--panel2);font-size:19px}
  .micbtn.rec{background:rgba(255,93,125,.25);color:var(--danger);animation:micpulse 1s infinite}
  @keyframes micpulse{0%,100%{box-shadow:0 0 0 0 rgba(255,93,125,.55)}50%{box-shadow:0 0 0 7px rgba(255,93,125,0)}}

  .shootbar{display:flex;align-items:center;justify-content:space-between;
    padding:12px 22px calc(env(safe-area-inset-bottom) + 14px);background:var(--bg)}
  .iconbtn{width:52px;height:52px;border-radius:50%;background:var(--panel2);display:flex;align-items:center;justify-content:center;font-size:22px}
  .iconbtn:active{background:#264168}
  .iconbtn.on{background:rgba(245,158,11,.2);color:var(--gold)}
  .shutter{width:78px;height:78px;border-radius:50%;background:#fff;border:5px solid rgba(255,255,255,.35);
    box-shadow:0 0 0 3px var(--gold)}
  .shutter:active{transform:scale(.92)}
  .shutter[disabled]{opacity:.4}
  .donebtn{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;
    width:62px;height:52px;border-radius:13px;background:var(--panel2);font-weight:800}
  .donebtn b{font-size:18px;line-height:1;color:var(--teal)}
  .donebtn s{font-size:10px;text-decoration:none;color:var(--dim)}
  .donebtn:active{background:#264168}
  .donebtn[disabled]{opacity:.35}

  /* リスト共通 */
  .pad{padding:12px 14px;overflow-y:auto;flex:1;min-height:0}
  .search{width:100%;padding:12px 14px;border-radius:12px;background:var(--panel);border:1px solid var(--line);
    color:var(--txt);font-size:15px;margin-bottom:10px}
  .search::placeholder{color:var(--dim)}
  .srow{display:flex;gap:8px;margin-bottom:8px}
  .srow .search{margin-bottom:0;flex:1;min-width:0}
  .srow .micbtn{flex:0 0 auto;width:46px;border-radius:12px;background:var(--panel);border:1px solid var(--line);font-size:19px}
  .srow .micbtn.rec{background:rgba(255,93,125,.25);color:var(--danger);animation:micpulse 1s infinite}
  .sortbar{display:flex;gap:6px;overflow-x:auto;padding:2px 0 10px;scrollbar-width:none}
  .sortbar::-webkit-scrollbar{display:none}
  .sortchip{flex:0 0 auto;padding:7px 11px;border-radius:16px;background:var(--panel2);font-size:12px;font-weight:700;
    color:var(--dim);white-space:nowrap;border:1.5px solid transparent}
  .sortchip.active{background:rgba(245,158,11,.16);color:var(--gold);border-color:var(--gold)}
  .crow{display:flex;align-items:center;gap:10px;padding:13px 14px;border-radius:13px;background:var(--panel);
    border:1px solid var(--line);margin-bottom:9px}
  .crow:active{background:var(--panel2)}
  .crow .nm{font-size:15px;font-weight:800}
  .crow .mt{font-size:11.5px;color:var(--dim);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .crow .pc{flex:0 0 auto;display:flex;flex-direction:column;align-items:center;gap:1px;background:var(--panel2);border-radius:10px;padding:6px 9px;min-width:48px}
  .crow .pc b{font-size:16px;font-weight:900;color:var(--teal);line-height:1}
  .crow .pc s{font-size:9.5px;color:var(--dim);text-decoration:none}
  .emptyst{text-align:center;color:var(--dim);padding:40px 20px;line-height:1.9;font-size:13.5px}

  /* インボックス/ギャラリー行（データ＝写真の組） */
  .drow{display:flex;gap:10px;padding:10px;border-radius:13px;background:var(--panel);border:1px solid var(--line);margin-bottom:9px;align-items:center}
  .drow .th{flex:0 0 auto;width:60px;height:60px;border-radius:10px;overflow:hidden;background:var(--panel2);position:relative}
  .drowname{flex:1 1 auto;min-width:0;text-align:left;font-size:12px;font-weight:800;color:#cbd5e0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;padding:0 4px}
  .drowact.lr .drowbtn{white-space:nowrap;flex:0 0 auto}
  .drowact.lr .ico{margin-left:auto}
  .drow .th img{width:100%;height:100%;object-fit:cover;display:block}
  .drow .th .n{position:absolute;right:3px;bottom:3px;background:rgba(15,27,45,.85);color:var(--teal);font-size:10px;font-weight:900;padding:1px 6px;border-radius:7px}
  .drow .bd{flex:1;min-width:0;display:flex;flex-direction:column;gap:3px}
  .drow .ad{font-size:13.5px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .drow .ad.pend{color:var(--dim);font-weight:600}
  .drow .wn{font-size:11px;color:var(--dim);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .drow .delbtn{flex:0 0 auto;width:42px;height:42px;border-radius:11px;background:rgba(255,93,125,.14);color:var(--danger);font-size:18px;display:flex;align-items:center;justify-content:center}
  .drowact{margin-top:7px;display:flex;gap:6px;align-items:center;flex-wrap:nowrap}
  .drowbtn{border:1px solid rgba(255,255,255,.18);background:rgba(255,255,255,.06);color:#dbe4f0;border-radius:9px;padding:7px 11px;font-size:12px;font-weight:800;font-family:inherit;cursor:pointer}
  .drowbtn.pri{background:#2c5282;border-color:#2c5282;color:#fff}
  .drowbtn.ico{padding:7px 11px;font-size:15px;flex:0 0 auto}
  .drowbtn.del{background:rgba(255,93,125,.14);border-color:rgba(255,93,125,.32);color:var(--danger)}
  .drowbtn.ret{background:rgba(99,102,241,.18);border-color:rgba(99,102,241,.42);color:#a5b4fc}
  .drowact.lr{justify-content:space-between}
  .drow .delbtn:active{background:rgba(255,93,125,.28)}
  .drow .selbox{flex:0 0 auto;width:26px;display:flex;align-items:center;justify-content:center;cursor:pointer;align-self:stretch}
  .drow .drowstar{flex:0 0 auto;width:26px;display:flex;align-items:center;justify-content:center;font-size:17px;color:var(--gold);align-self:stretch;user-select:none}
  .drow .selbox .cbx{width:24px;height:24px;border-radius:7px;border:2px solid var(--line);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:900;color:#1a1300;background:transparent}
  .drow .selbox .cbx.on{background:var(--gold);border-color:var(--gold)}
  .drow.selrow{border-color:rgba(245,158,11,.32)}
  .autobadge{display:inline-block;margin-left:6px;font-size:9.5px;font-weight:800;padding:1px 6px;border-radius:6px;background:rgba(56,189,176,.16);color:var(--teal);vertical-align:middle}
  .selhdr{display:flex;align-items:center;justify-content:space-between;gap:8px}
  .selhdr .seltools{display:flex;gap:6px;flex:0 0 auto}
  .selhdr .seltools button{font-family:inherit;font-size:11px;font-weight:800;padding:5px 10px;border-radius:7px;background:var(--panel2);color:var(--gold);border:1px solid var(--line);cursor:pointer}
  .selhdr .seltools button:active{filter:brightness(1.3)}
  .sendhint{font-size:11.5px;color:var(--dim);line-height:1.65;margin:0 2px 10px;padding:9px 12px;border-radius:11px;background:var(--panel);border:1px solid var(--line)}
  .sendhint b{color:var(--teal)}
  .drow .delbtn.ret{background:rgba(52,227,208,.14);color:var(--teal)}
  .drow .delbtn.ret:active{background:rgba(52,227,208,.28)}
  .sentbadge{display:inline-block;font-size:10px;font-weight:800;color:var(--ok);background:rgba(52,227,208,.14);border-radius:6px;padding:1px 6px}
  .warnbar{padding:11px 13px;border-radius:12px;margin-bottom:10px;font-size:12.5px;font-weight:700;line-height:1.5}
  .warnbar.soft{background:rgba(245,158,11,.14);color:var(--gold);border:1px solid rgba(245,158,11,.4)}
  .warnbar.hard{background:rgba(255,93,125,.14);color:var(--danger);border:1px solid rgba(255,93,125,.45)}
  .storeline{font-size:11px;color:var(--dim);text-align:center;padding:14px 0 6px}

  .galgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}
  .gcell{position:relative;aspect-ratio:1;border-radius:9px;overflow:hidden;background:var(--panel2)}
  .gcell img{width:100%;height:100%;object-fit:cover;display:block}
  .gcell .n{position:absolute;right:4px;bottom:4px;background:rgba(15,27,45,.82);color:var(--teal);font-size:10px;font-weight:800;padding:2px 6px;border-radius:6px}
  .galsec{font-size:12px;font-weight:800;color:var(--gold);margin:14px 2px 7px}

  /* 単写真ビューア */
  #viewer{position:fixed;inset:0;background:rgba(7,12,20,.97);z-index:50;display:flex;flex-direction:column}
  #viewer img#vImg{flex:1;min-height:0;object-fit:contain;width:100%}
  .vtop{display:flex;align-items:center;gap:8px;padding:calc(env(safe-area-inset-top) + 10px) 14px 10px}
  .vacts{display:flex;gap:8px;padding:10px 14px calc(env(safe-area-inset-bottom) + 16px)}
  .vbtn{flex:1;padding:13px;border-radius:12px;background:var(--panel2);font-size:14px;font-weight:800;text-align:center}
  .vbtn.danger{background:rgba(255,93,125,.16);color:var(--danger)}
  .vbtn:active{filter:brightness(1.2)}

  /* 数字キーパッド */
  #keypad{position:fixed;inset:0;background:rgba(7,12,20,.6);z-index:70;display:flex;align-items:flex-end}
  .kpcard{width:100%;background:var(--panel);border-top:1px solid var(--line);border-radius:18px 18px 0 0;padding:14px 14px calc(env(safe-area-inset-bottom) + 14px)}
  .kphead{display:flex;justify-content:space-between;align-items:center;padding:2px 4px 12px;font-size:13px;color:var(--dim);font-weight:700}
  .kphead #kpVal{font-size:22px;font-weight:900;color:var(--teal);letter-spacing:2px}
  .kpgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:9px}
  .kpgrid button{padding:16px 0;border-radius:13px;background:var(--panel2);font-size:22px;font-weight:800}
  .kpgrid button:active{background:#264168}
  .kpgrid .kpsub{background:#13223a;color:var(--gold);font-size:20px}
  .kpacts{display:flex;gap:9px;margin-top:11px}
  .kpacts button{flex:1;padding:14px;border-radius:13px;font-size:15px;font-weight:800}
  .kpacts .kpx{background:var(--panel2);color:var(--dim)}
  .kpacts .kpok{background:var(--gold);color:#1a1300}

  /* 位置修正マップ */
  #mapEdit{position:fixed;inset:0;background:var(--bg);z-index:75;display:flex;flex-direction:column}
  #leafWrap{position:relative;flex:1;min-height:0}
  #leafMap{position:absolute;inset:0;background:#0a1422}
  #centerPin{position:absolute;left:50%;top:50%;transform:translate(-50%,-100%);pointer-events:none;z-index:600;filter:drop-shadow(0 2px 3px rgba(0,0,0,.45))}
  .mefoot{display:flex;align-items:center;gap:10px;padding:12px 14px calc(env(safe-area-inset-bottom) + 14px);background:var(--bg)}
  .mefoot .vbtn{flex:0 0 auto;width:auto;padding:12px 16px}
  .mehint{font-size:11px;color:var(--dim);line-height:1.4}
  .aibis-pin{background:none;border:none}

  .linkbadge{display:inline-block;font-size:10px;font-weight:800;border-radius:6px;padding:1px 6px;background:rgba(52,227,208,.14);color:var(--teal)}
  .linkbadge.un{background:rgba(245,158,11,.16);color:var(--gold)}
  .notepk{display:inline-block;max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;vertical-align:bottom;color:var(--dim);cursor:pointer;text-decoration:underline dotted}
  .inbtools{display:flex;gap:8px;margin-bottom:10px}
  .vbtn[disabled]{opacity:.4}
  #camCfg{position:fixed;inset:0;background:rgba(7,12,20,.6);z-index:72;display:flex;align-items:flex-end}
  #toast{position:fixed;left:50%;top:calc(env(safe-area-inset-top) + 60px);transform:translateX(-50%) translateY(-14px);
    background:var(--panel2);color:var(--txt);padding:10px 16px 10px 12px;border-radius:18px;font-size:13.5px;font-weight:700;
    opacity:0;transition:.25s;z-index:80;border:1px solid var(--line);pointer-events:none;max-width:86%;display:inline-flex;align-items:center;gap:9px;text-align:left;line-height:1.5}
  #toast .toast-fairy{position:relative;flex:0 0 auto;width:26px;height:26px;display:inline-flex;align-items:center;justify-content:center}
  #toast .toast-fairy::after{content:'';position:absolute;inset:-7px;border-radius:50%;background:radial-gradient(circle,rgba(246,173,85,.55),rgba(246,173,85,0) 70%);z-index:0;animation:abGlow 1.8s ease-in-out infinite}
  #toast .tf-face{position:relative;z-index:1;font-size:20px;line-height:1;display:inline-block;transform-origin:50% 80%;animation:abFloat 1.5s ease-in-out infinite}
  #toast .tf-spark{position:absolute;z-index:1;font-size:9px;animation:abSpark 1.3s ease-in-out infinite}
  #toast .tf-s1{top:-3px;left:-4px}
  #toast .tf-s2{bottom:-3px;right:-4px;animation-delay:.65s}
  #toast .toast-msg{flex:1 1 auto;min-width:0}
  #toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  @keyframes abFloat{0%,100%{transform:translateY(0) rotate(-5deg)}50%{transform:translateY(-3px) rotate(5deg)}}

    L=L.replace(/してくださいね/g,"してね").replace(/してください/g,"してね").replace(/して下さい/g,"してね")
       .replace(/いたしました/g,"したよ").replace(/しました/g,"したよ").replace(/できました/g,"できたよ")
       .replace(/されました/g,"されたよ").replace(/しています/g,"してるよ").replace(/しております/g,"してるよ")
       .replace(/できませんでした/g,"できなかったよ").replace(/見つかりませんでした/g,"見つからなかったよ").replace(/ありませんでした/g,"なかったよ")
       .replace(/対応していません/g,"対応してないよ")
       .replace(/できません(?!でした)/g,"できないよ").replace(/見つかりません(?!でした)/g,"見つからないよ").replace(/ありません(?!でした)/g,"ないよ");
    L=L.replace(/です。/g,"だよ。").replace(/です$/,"だよ");

/* ---------- IndexedDB ---------- */
function openDB(){
  return new Promise((res,rej)=>{
    const r=indexedDB.open(DB_NAME,1);
    r.onupgradeneeded=()=>{
      const db=r.result;
      if(!db.objectStoreNames.contains(STORE)){
        const os=db.createObjectStore(STORE,{keyPath:"id"});
        os.createIndex("by_card","cardId",{unique:false});
        os.createIndex("by_ts","ts",{unique:false});
      }
    };
    r.onsuccess=()=>res(r.result);
    r.onerror=()=>rej(r.error);
  });
}
function tx(m){ return DB.transaction(STORE,m).objectStore(STORE); }
function idbAll(){ return new Promise((res,rej)=>{ const out=[]; const q=tx("readonly").openCursor(); q.onsuccess=()=>{ const c=q.result; if(c){ out.push(normalize(c.value)); c.continue(); } else res(out); }; q.onerror=()=>rej(q.error); }); }
function mediaPing(){ try{ localStorage.setItem("aibis_media_ping", String(Date.now())); }catch(e){} }
function idbPut(rec){ return new Promise((res,rej)=>{ const q=tx("readwrite").put(rec); q.onsuccess=()=>{ mediaPing(); res(); }; q.onerror=()=>rej(q.error); }); }
function idbDel(id){ return new Promise((res,rej)=>{ const q=tx("readwrite").delete(id); q.onsuccess=()=>{ mediaPing(); res(); }; q.onerror=()=>rej(q.error); }); }
function idbGetRaw(id){ return new Promise((res,rej)=>{ const q=tx("readonly").get(id); q.onsuccess=()=>res(q.result); q.onerror=()=>rej(q.error); }); }
async function idbGet(id){ return normalize(await idbGetRaw(id)); }
function idbByCard(cardId){
  return new Promise((res,rej)=>{
    const out=[], idx=tx("readonly").index("by_card"), q=idx.openCursor(IDBKeyRange.only(cardId));
    q.onsuccess=()=>{ const c=q.result; if(c){ out.push(normalize(c.value)); c.continue(); } else { out.sort((a,b)=>a.ts-b.ts); res(out); } };
    q.onerror=()=>rej(q.error);
  });
}
function idbCountByCard(cardId){
  return new Promise((res)=>{ const idx=tx("readonly").index("by_card"); const q=idx.count(IDBKeyRange.only(cardId));
    q.onsuccess=()=>res(q.result||0); q.onerror=()=>res(0); });
}

function normalize(rec){

  rec.photos=[{pid:(rec.id||rid("p"))+"_0", full:rec.full, thumb:rec.thumb, w:rec.w, h:rec.h, size:rec.size}];
  if(rec.sent===undefined) rec.sent=false;

}

async function loadMuni(){

    const map={}; const re=/"(\d{5})"\s*\]?\s*[:=]\s*['"]([^'"]+)['"]/g; let m;
    while((m=re.exec(txt))){ const parts=m[2].split(","); map[m[1]]={pref:parts[1]||"",city:parts[3]||parts[parts.length-1]||""}; }
    if(Object.keys(map).length){ try{ localStorage.setItem("aibis_muni_v1", JSON.stringify(map)); }catch(e){} base=Object.assign(base, map); }
  }catch(e){}

}
async function gsiReverse(lat,lng){
  const r=await fetch(GSI_URL+"?lat="+lat+"&lon="+lng,{mode:"cors"});
  const j=await r.json(); const res=j&&j.results;
  let lv=res&&res.lv01Nm?String(res.lv01Nm):""; if(lv==="－"||lv==="−") lv="";
  const muni=res&&res.muniCd?String(res.muniCd):"";
  return {muni, lv};
}
async function composeAddress(lat,lng){

  if(muni){ const M=await loadMuni(); const e=M&&(M[muni]||M[muni.slice(0,5)]); if(e){ pref=e.pref; city=e.city; } }
  let head=city; if(pref && pref!=="東京都") head=pref+city;
  return (head||"")+(lv||"");
}
async function resolveAddr(id){

  try{ const a=await composeAddress(p.lat,p.lng); const cur=await idbGet(id); if(!cur) return;
    cur.addr=a||""; cur.addrPending=false; await idbPut(cur);
  }catch(e){ const cur=await idbGet(id); if(cur){ cur.addrPending=false; await idbPut(cur); } }

  if(curSet===id && !screens.cam.classList.contains("hide")) renderSetPanel();

(function(){
  const wrap=$("camWrap"), vid=$("video");
  let pinching=false, pDist=0, pZoom=1, tx=0, ty=0, tMoved=false, tT=0, _zbT=null;
  function d2(t){ const dx=t[0].clientX-t[1].clientX, dy=t[0].clientY-t[1].clientY; return Math.hypot(dx,dy); }
  function showZoom(r){ const b=$("zoomBadge"); if(!b) return; b.textContent="×"+(Math.round(r*10)/10); b.classList.add("show"); clearTimeout(_zbT); _zbT=setTimeout(()=>b.classList.remove("show"),900); }
  function applyZoom(z){
    if(_zoomCap){ z=Math.max(_zoomCap.min,Math.min(_zoomCap.max,z)); _curZoom=z; try{ track.applyConstraints({advanced:[{zoom:z}]}); }catch(e){} showZoom(z/_zoomCap.min); }
    else { z=Math.max(1,Math.min(5,z)); _curZoom=z; vid.style.transform="scale("+z+")"; showZoom(z); }
  }
  function tapFocus(cx,cy){
    if(!track) return;
    const r=wrap.getBoundingClientRect(); const x=cx-r.left, y=cy-r.top;
    const ring=$("focusRing"); if(ring){ ring.style.left=x+"px"; ring.style.top=y+"px"; ring.classList.remove("go"); void ring.offsetWidth; ring.classList.add("go"); }
    const nx=Math.max(0,Math.min(1,x/r.width)), ny=Math.max(0,Math.min(1,y/r.height));
    try{
      if(_focusPOI){ const a={pointsOfInterest:[{x:nx,y:ny}]}; if(_focusModes.indexOf("single-shot")>=0)a.focusMode="single-shot"; track.applyConstraints({advanced:[a]}).catch(()=>{}); }
      else if(_focusModes.indexOf("single-shot")>=0){ track.applyConstraints({advanced:[{focusMode:"single-shot"}]}).then(()=>{ setTimeout(()=>{ try{ if(_focusModes.indexOf("continuous")>=0) track.applyConstraints({advanced:[{focusMode:"continuous"}]}); }catch(e){} },1400); }).catch(()=>{}); }
    }catch(e){}
  }
  wrap.addEventListener("touchstart",e=>{
    if(e.target.closest(".errcard")||e.target.closest("#camToggle")) return;
    if(e.touches.length===2){ pinching=true; pDist=d2(e.touches); pZoom=_curZoom||1; e.preventDefault(); }
    else if(e.touches.length===1){ const t=e.touches[0]; tx=t.clientX; ty=t.clientY; tMoved=false; tT=Date.now(); }
  },{passive:false});
  wrap.addEventListener("touchmove",e=>{
    if(pinching && e.touches.length===2){ const d=d2(e.touches); if(pDist>0) applyZoom(pZoom*(d/pDist)); e.preventDefault(); }
    else if(e.touches.length===1){ const t=e.touches[0]; if(Math.abs(t.clientX-tx)>10||Math.abs(t.clientY-ty)>10) tMoved=true; }
  },{passive:false});
  wrap.addEventListener("touchend",e=>{
    if(pinching){ if(e.touches.length<2) pinching=false; return; }
    if(!tMoved && (Date.now()-tT)<400 && e.changedTouches.length){
      const t=e.changedTouches[0];
      if(t.target&&(t.target.closest(".errcard")||t.target.closest("#camToggle")||t.target.closest(".gpschip"))) return;
      tapFocus(t.clientX,t.clientY);
    }
  });
})();
async function capture(){

  const v=$("video"), vw=v.videoWidth, vh=v.videoHeight;
  if(!vw||!vh){ toast("準備中…もう一度"); return; }
  // 4枚チェック
  if(curSet){ const s=await idbGet(curSet); if(s && s.photos.length>=MAX_PHOTOS){
    toast("1データは4枚までです。不要な写真を削除するか「完了」で次のデータへ"); return; } }
  capturing=true;
  try{
    const fx=$("flashfx"); fx.classList.remove("go"); void fx.offsetWidth; fx.classList.add("go");
    var dz=(!_zoomCap && _curZoom>1)?_curZoom:1;
    var sw=vw/dz, sh=vh/dz, sx=(vw-sw)/2, sy=(vh-sh)/2;
    const scale=Math.min(1, MAX_EDGE/Math.max(sw,sh));
    const w=Math.round(sw*scale), h=Math.round(sh*scale);
    const cv=document.createElement("canvas"); cv.width=w; cv.height=h; cv.getContext("2d").drawImage(v,sx,sy,sw,sh,0,0,w,h);
    const full=await new Promise(r=>cv.toBlob(r,"image/jpeg",JPEG_Q));
    const photo={ pid:rid("p"), full, thumb:makeThumb(cv,w,h), w, h, size:(full?full.size:0) };
    await addPhoto(photo);
    if(navigator.vibrate) navigator.vibrate(15);
  }catch(e){ toast("保存に失敗（容量不足の可能性）"); }
  capturing=false;
}

function makeThumb(srcCv,w,h){
  const sc=Math.min(1, THUMB_EDGE/Math.max(w,h));
  const tw=Math.round(w*sc), th=Math.round(h*sc);
  const t=document.createElement("canvas"); t.width=tw; t.height=th; t.getContext("2d").drawImage(srcCv,0,0,tw,th);
  return t.toDataURL("image/jpeg",0.72);
}

async function buildBundle(sets){

var PACE_LIMIT={S:7,A:10,B:21,C:40,D:80}; // 確定(v6.69) 推奨訪問ペース。超過で遅れ判定。個人差は一律運用

  else if(tsubo<100) landScore=2;

    else if(rosen<30) rosenCoef=0.9;

const REVISIT_PHASE={span:14,times:3,interval:5};
function getLastVD(c){ var d=[]; (c.pursuits||[]).forEach(v=>{if(v.date)d.push(v.date);}); (c.revisits||[]).forEach(v=>{if(v.date)d.push(v.date);}); if(c.discovery_date)d.push(c.discovery_date); return d.length?d.sort((a,b)=>b.localeCompare(a))[0]:""; }
function getArea(addr){ if(!addr)return""; var m=addr.match(/^(.+?[都道府県])(.+?[市区町村郡])/); return m?m[1]+m[2]:addr.substring(0,10); }

function _judgeMissing(c){ return !c.pursuit_judge && !_isRevisitPhase(c); }
function _revisitCount(c){ return ((c&&c.revisits)||[]).filter(v=>v&&(String(v.content||"").trim()||String(v.rec||"").trim())).length; }
function _hasPursuitActivity(c){ if(!c)return false; if(c.pursuit_judge)return true; return ((c.pursuits)||[]).some(v=>v&&(v.date||v.content||v.rec||v.appo||v.interviewer)); }
function calcPaceOverrate(c){
  var a=[]; if(c.discovery_date)a.push(c.discovery_date); (c.revisits||[]).forEach(v=>{if(v.date)a.push(v.date);}); (c.pursuits||[]).forEach(v=>{if(v.date)a.push(v.date);});
  if(!a.length)return -1; a.sort(); var days=Math.floor((new Date()-new Date(a[a.length-1]))/86400000);
  if(_isRevisitPhase(c)){ var sd=Math.floor((new Date()-new Date(c.discovery_date))/86400000); var r=days/REVISIT_PHASE.interval; if(sd>REVISIT_PHASE.span)r=Math.max(r,sd/REVISIT_PHASE.span); return r; }
  var lim=PACE_LIMIT[c.pursuit_judge||""]; if(!lim)return -1; return days/lim;
}

function _cTs(c){ if(!c)return 0; if(c.updated_at){var u=new Date(c.updated_at).getTime(); if(!isNaN(u))return u;} if(c.created_at){var t=new Date(c.created_at).getTime(); if(!isNaN(t))return t;} var m=/^c_(\d+)/.exec(c.id||""); if(m)return +m[1]; return 0; }

var KAIWA_ORDER=["ピンポン","立ち話","玄関内","連れ出し","上り込み"];
function _kaiwaMax(c){ var arr=Array.isArray(c.kaiwa)?c.kaiwa:(c.kaiwa?[c.kaiwa]:[]); var max=-1; arr.forEach(function(v){ var idx=KAIWA_ORDER.indexOf(v); if(idx>max)max=idx; }); return max; }

function getSortedCards(src){

  if(sortKey==="lv"){ arr.sort(function(a,b){ var d=dir*getLastVD(b).localeCompare(getLastVD(a)); return d!==0?d:(_cTs(b)-_cTs(a)); }); }
  else if(sortKey==="cust"){ arr=arr.filter(function(c){return c&&c.cust_type==="顧客";}); arr.sort(function(a,b){ return _cTs(b)-_cTs(a); }); }
  else if(sortKey==="ad"){ var ad=sortDir["ad"]==="desc"?-1:1; arr.sort(function(a,b){ return ad*getArea(a.address||"").localeCompare(getArea(b.address||""),"ja"); }); }
  else if(sortKey==="st"){ arr.sort(function(a,b){ var sa=(a.stage!==""&&a.stage!=null)?+a.stage:(dir>0?-1:99); var sb=(b.stage!==""&&b.stage!=null)?+b.stage:(dir>0?-1:99); return dir*(sb-sa); }); }
  else if(sortKey==="sc"){ arr.sort(function(a,b){ return dir*(calcScore(b)-calcScore(a)); }); }
  else if(sortKey==="pj"){ var o={S:0,A:1,B:2,C:3,D:4,E:5,X:6}; arr.sort(function(a,b){ var pa=o[a.pursuit_judge]!==undefined?o[a.pursuit_judge]:99; var pb=o[b.pursuit_judge]!==undefined?o[b.pursuit_judge]:99; return dir*(pa-pb); }); }

  else if(sortKey==="pace"){ arr.sort(function(a,b){ var ra=calcPaceOverrate(a),rb=calcPaceOverrate(b); if(ra===-1&&rb===-1)return 0; if(ra===-1)return 1; if(rb===-1)return -1; return dir*(rb-ra); }); }

/* ---------- カード別ギャラリー ---------- */
async function openGallery(cardId,cameFromCam){
  _scr="gal";
  targetCard=cardId; openGallery._fromCam=!!cameFromCam;
  $("galCardName").textContent=cardLabel(cardId); $("galCardMeta").textContent=cardMeta(cardId);
  show("gal"); stopCamera(); await renderGallery(); showStorage("storeLine");
}
async function renderGallery(){
  const list=(await idbByCard(targetCard)).sort((a,b)=>b.ts-a.ts);
  const host=$("galBody");
  if(!list.length){ host.innerHTML='<div class="emptyst">まだ写真がありません。<br>「📷 撮る」から撮影してください。</div>'; return; }
  host.innerHTML='<div class="galsec">計画地データ（'+list.length+'件）</div>'+list.map(s=>drowHtml(s)).join("");
  bindDrows(host,"gal");
}
$("galBack").addEventListener("click",()=>{ history.back(); });
$("galShoot").addEventListener("click",()=>{ openGallery._fromCam=true; enterCamera(targetCard); });

/* ---------- 容量表示 ---------- */
async function showStorage(targetId){
  let line="";
  if(navigator.storage&&navigator.storage.estimate){ try{ const est=await navigator.storage.estimate(); line="使用容量 "+fmtMB(est.usage)+" / 上限目安 "+fmtMB(est.quota); }catch(e){} }
  $(targetId).textContent=line;
}
const fmtMB = b => b? (b>1073741824? (b/1073741824).toFixed(1)+"GB" : Math.round(b/1048576)+"MB") : "—";

/* ---------- 単写真ビューア（左右フリックでめくる） ---------- */
let viewSet=null, viewIdx=0;
async function openPhoto(setId,pid){
  const s=await idbGet(setId); if(!s) return;
  const i=s.photos.findIndex(p=>p.pid===pid); if(i<0) return;
  viewSet=s; showPhotoAt(i);
  $("viewer").classList.remove("hide");
}
function showPhotoAt(i){
  if(!viewSet||!viewSet.photos.length) return;
  i=Math.max(0,Math.min(i, viewSet.photos.length-1)); viewIdx=i;
  const p=viewSet.photos[i]; viewPhoto={setId:viewSet.id, pid:p.pid};
  clearObjUrls(); const u=URL.createObjectURL(p.full); _objUrls.push(u);
  $("vImg").src=u; $("vWhen").textContent=(i+1)+"/"+viewSet.photos.length+"・"+(p.w+"×"+p.h)+"・"+fmtMB(p.size);
}
let _tsx=0,_tsy=0;
$("viewer").addEventListener("touchstart",e=>{ const t=e.changedTouches[0]; _tsx=t.clientX; _tsy=t.clientY; },{passive:true});
$("viewer").addEventListener("touchend",e=>{
  const t=e.changedTouches[0], dx=t.clientX-_tsx, dy=t.clientY-_tsy;
  if(Math.abs(dx)>45 && Math.abs(dx)>Math.abs(dy)){ if(dx<0) showPhotoAt(viewIdx+1); else showPhotoAt(viewIdx-1); }
},{passive:true});
$("vClose").addEventListener("click",()=>{ $("viewer").classList.add("hide"); viewPhoto=null; viewSet=null; });
$("vDelPhoto").addEventListener("click",()=>{
  if(!viewPhoto) return;
  aibisConfirm("この写真を削除しますか？", async()=>{
  const s=await idbGet(viewPhoto.setId); if(!s) return;
  s.photos=s.photos.filter(p=>p.pid!==viewPhoto.pid);
  let closed=false;
  if(!s.photos.length){ await idbDel(s.id); await refreshIndex(s.cardId); if(curSet===s.id) curSet=null; closed=true; }
  else { await idbPut(s); }
  if(!screens.cam.classList.contains("hide")) renderSetPanel();
  if(!screens.inbox.classList.contains("hide")) renderInbox();
  if(!screens.gal.classList.contains("hide")) renderGallery();
  await updateRightCount(); toast("削除しました");
  if(closed){ $("viewer").classList.add("hide"); viewPhoto=null; viewSet=null; }
  else { viewSet=s; showPhotoAt(Math.min(viewIdx, s.photos.length-1)); } // 残りを表示し続ける
  }, "削除する", "やめる");
});

/* ---------- 位置修正（Leaflet 中心ピン固定） ---------- */
function loadLeaflet(){
  return new Promise((res,rej)=>{
    if(window.L) return res();
    const css=document.createElement("link"); css.rel="stylesheet"; css.href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"; document.head.appendChild(css);
    const js=document.createElement("script"); js.src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"; js.onload=()=>res(); js.onerror=()=>rej(new Error("leaflet")); document.head.appendChild(js);
  });
}
$("vFix").addEventListener("click",async()=>{
  const s=await idbGet(curSet); if(!s||s.lat==null){ toast("位置情報がありません"); return; }
  meTargetId=curSet;
  try{ await loadLeaflet(); }
  catch(e){
    if(navigator.geolocation){ toast("地図を読み込めません。現在地で取り直します");
      navigator.geolocation.getCurrentPosition(async pos=>{ const cur=await idbGet(meTargetId); if(!cur) return;
        cur.lat=pos.coords.latitude; cur.lng=pos.coords.longitude; cur.acc=pos.coords.accuracy; cur.addrPending=true; await idbPut(cur); fillAddr(cur); resolveAddr(meTargetId); toast("現在地に補正しました");
      },()=>toast("現在地を取得できませんでした"),{enableHighAccuracy:true,maximumAge:0,timeout:15000});
    } else toast("地図も現在地も利用できません");
    return;
  }
  $("mapEdit").classList.remove("hide"); setTimeout(()=>initLeaflet(s.lat,s.lng),60);
});
function initLeaflet(lat,lng){
  if(!leafMap){
    leafMap=L.map("leafMap",{zoomControl:true}).setView([lat,lng],18);
    L.tileLayer("https://tile.openstreetmap.org/{z}/{x}/{y}.png",{maxZoom:20,attribution:"© OpenStreetMap"}).addTo(leafMap);
  } else { leafMap.setView([lat,lng],18); }
  setTimeout(()=>leafMap.invalidateSize(),80);
}
$("meHere").addEventListener("click",()=>{
  if(!navigator.geolocation){ toast("現在地に未対応"); return; }
  navigator.geolocation.getCurrentPosition(pos=>{ if(leafMap) leafMap.setView([pos.coords.latitude,pos.coords.longitude],18); },()=>toast("現在地を取得できませんでした"),{enableHighAccuracy:true,maximumAge:0,timeout:15000});
});
$("meCancel").addEventListener("click",()=>$("mapEdit").classList.add("hide"));
$("meSave").addEventListener("click",async()=>{
  if(!leafMap){ $("mapEdit").classList.add("hide"); return; }
  const c=leafMap.getCenter(); const s=await idbGet(meTargetId); if(!s){ $("mapEdit").classList.add("hide"); return; }
  s.lat=c.lat; s.lng=c.lng; s.acc=null; s.addrPending=true; await idbPut(s);
  $("mapEdit").classList.add("hide"); fillAddr(s); resolveAddr(meTargetId); toast("位置を修正しました");
});

/* ---------- util ---------- */
function esc(s){ return String(s==null?"":s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }
function fmtWhen(ts){ const d=new Date(ts), p=n=>String(n).padStart(2,"0"); return d.getFullYear()+"/"+p(d.getMonth()+1)+"/"+p(d.getDate())+" "+p(d.getHours())+":"+p(d.getMinutes()); }

document.addEventListener("visibilitychange",()=>{
  if(document.hidden){ stopCamera(); }
  else {
    if(!screens.cam.classList.contains("hide")) startCamera();
    try{ if(!screens.inbox.classList.contains("hide")) renderInbox(); }catch(e){}
    try{ updateRightCount(); }catch(e){}
  }
});
// 本体（別タブ）で追加/削除/紐付け変更があったら即反映（同一オリジン連携）
window.addEventListener("storage",(ev)=>{
  if(ev.key!=="aibis_media_ping") return;
  try{ if(!screens.inbox.classList.contains("hide")) renderInbox(); }catch(e){}
  try{ updateRightCount(); }catch(e){}
});
window.addEventListener("pagehide",stopCamera);

boot();

<script>
/* 古いキャッシュ対策：最新版と照合し違えば一度だけ最新URLへ読み直す */
window.addEventListener('load',function(){
  try{
    var cur=(typeof APP_VERSION!=='undefined')?APP_VERSION:'';
    if(!cur) return;
    fetch(location.pathname+'?_v='+Date.now(),{cache:'no-store',headers:{'Range':'bytes=0-30000'}})
      .then(function(r){ return (r&&(r.ok||r.status===206))?r.text():null; })
      .then(function(t){
        if(!t) return;
        var m=t.match(/APP_VERSION = "([^"]+)"/);
        if(m&&m[1]&&m[1]!==cur){ location.replace(location.pathname+(location.search?location.search+'&':'?')+'v='+encodeURIComponent(m[1])+location.hash); }
      }).catch(function(){});
  }catch(e){}
});
</script>
